name: Hello world Workflow

on:
    push:
        branches: main
    pull_request: 
    workflow_dispatch:


jobs:
    hello:
        runs-on : ubantu-latest
        steps:
            - uses : actions/checkout@v4
            - name: hello world
              run: echo "hello world"
              shell: bash
    
    goodBy:
        runs-on : ubantu-latest
        steps:
            - name : goodbye world
              run : echo "Good Bye world"
              shell : bash
